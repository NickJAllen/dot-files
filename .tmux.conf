unbind C-b
set -g prefix C-t
unbind r
bind r source-file $HOME/.tmux.conf

set -g mouse on

set -g renumber-windows on  # keep numbering sequential

# Use fish shell for new windows and panes
set -g default-command fish

# Options: start indexes from 1
set -g base-index 1
set -g pane-base-index 1

# Enable vim motions in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Allow OSC 52 to pass through
set -s set-clipboard on

set -sg terminal-overrides ",*:RGB"  # true color support

bind c new-window -c "#{pane_current_path}"

# Keybindings: split
bind h split-window -h -c "#{?@neovim_path,#{@neovim_path},#{pane_current_path}}"
bind | split-window -h -c "#{?@neovim_path,#{@neovim_path},#{pane_current_path}}"
bind v split-window -v -c "#{?@neovim_path,#{@neovim_path},#{pane_current_path}}"
bind - split-window -v -c "#{?@neovim_path,#{@neovim_path},#{pane_current_path}}"

# Sort sessions by their name
bind s choose-tree -sZ -O name

# F to toggle fullscreen (toggle status bar in tmux)
bind-key f set -g status

# J to open Jujutsu interface
bind-key j display-popup \
    -d "#{?@neovim_path,#{@neovim_path},#{pane_current_path}}" \
    -w 80% \
    -h 80% \
    -E "jjui"

bind-key m run-shell -b "cd \"#{pane_current_path}\" && thg ci&"

bind-key s run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @catppuccin_flavor 'frappe'
set -g @plugin 'jtmcginty/tmux-session-dots'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Make the status line more pleasant.
set -g status-left ""
set -g status-right '#{session_dots} #[fg=#7aa2f7]󰒋 #h #[fg=#ff9e64]󱫋 #S #[fg=#4bbc70]󰘬 #(~/bin/vcs-status.sh #{pane_current_path})'

# Ensure that everything on the right side of the status line
# is included.
set -g status-right-length 100

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
